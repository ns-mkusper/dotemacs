name: tramp-ci

on:
  push:
    paths:
      - inits/60-tramp.el
      - tramp-test/**
      - .github/workflows/tramp-ci.yml
  pull_request:
    paths:
      - inits/60-tramp.el
      - tramp-test/**
      - .github/workflows/tramp-ci.yml
  workflow_dispatch:

jobs:
  platform-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emacs (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Install Emacs (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install emacs

      - name: Install Emacs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install emacs --yes --no-progress

      - name: Run TRAMP platform smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          emacs --batch -l tramp-test/smoke-platform.el

      - name: Run TRAMP platform smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          emacs --batch -l tramp-test/smoke-platform.el

  battery:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_case: [ci-direct, ci-bastion]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate test SSH key material
        run: |
          mkdir -p "${RUNNER_TEMP}/tramp-key"
          ssh-keygen -t ed25519 -N "" -f "${RUNNER_TEMP}/tramp-key/id_ed25519" >/dev/null
          cp "${RUNNER_TEMP}/tramp-key/id_ed25519.pub" "tramp-test/authorized_keys"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cached SSHD image
        uses: docker/build-push-action@v6
        with:
          context: ./tramp-test
          file: ./tramp-test/Dockerfile.sshd
          tags: tramp-sshd-test:latest
          load: true
          cache-from: type=gha,scope=tramp-sshd
          cache-to: type=gha,mode=max,scope=tramp-sshd

      - name: Build cached runner image
        uses: docker/build-push-action@v6
        with:
          context: ./tramp-test
          file: ./tramp-test/Dockerfile.runner
          tags: tramp-emacs-bench:latest
          load: true
          cache-from: type=gha,scope=tramp-runner
          cache-to: type=gha,mode=max,scope=tramp-runner

      - name: Run TRAMP battery
        env:
          TRAMP_TEST_CASE: ${{ matrix.test_case }}
          TRAMP_TEST_OUTPUT_DIR: ${{ runner.temp }}/tramp-out
          TRAMP_TEST_CYCLES: "3"
          TRAMP_TEST_VERBOSE: "10"
          TRAMP_TEST_TIMEOUT_SECS: "300"
          TRAMP_TEST_SKIP_BUILD: "1"
          TRAMP_TEST_KEY_FILE: ${{ runner.temp }}/tramp-key/id_ed25519
          TRAMP_TEST_KEY_PUB_FILE: ${{ runner.temp }}/tramp-key/id_ed25519.pub
        run: |
          chmod +x tramp-test/*.sh
          ./tramp-test/test-battery.sh

      - name: Package benchmark artifacts
        if: always()
        run: |
          case "${{ matrix.test_case }}" in
            ci-direct) scenario="direct" ;;
            ci-bastion) scenario="bastion" ;;
            *) echo "Unknown case" >&2; exit 1 ;;
          esac
          tar -C "${RUNNER_TEMP}/tramp-out" -czf "${RUNNER_TEMP}/tramp-${scenario}-artifacts.tgz" "${scenario}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tramp-${{ matrix.test_case }}-artifacts
          path: ${{ runner.temp }}/tramp-*.tgz
          retention-days: 14
